name: Build Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build 7zFM.exe (File Manager with Encoding Switch)
        shell: cmd
        run: |
          cd CPP\7zip\Bundles\Fm
          nmake NEW_COMPILER=1 MY_STATIC_LINK=1

      - name: Collect artifacts
        shell: cmd
        run: |
          mkdir dist
          copy CPP\7zip\Bundles\Fm\O\7zFM.exe dist\ 2>nul || copy CPP\7zip\Bundles\Fm\o\7zFM.exe dist\

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lwzip-windows-x64
          path: dist/
          retention-days: 30
